apiVersion: apps/v1
kind: Deployment
metadata:
  name: aixworkforce360-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aixworkforce360-backend
  template:
    metadata:
      labels:
        app: aixworkforce360-backend
    spec:
      containers:
        - name: backend
          image: aixworkforce360-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql://user:password@db:5432/aixworkforce360"
